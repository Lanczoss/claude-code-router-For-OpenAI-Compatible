<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0D1117"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Connections -->
  <path d="M250 200 Q 400 200 600 200" stroke="#3B82F6" stroke-width="3" stroke-dasharray="10 5" opacity="0.6"/>
  <path d="M600 200 Q 800 200 950 100" stroke="#10B981" stroke-width="2" stroke-dasharray="5 5" opacity="0.4"/>
  <path d="M600 200 Q 800 200 950 200" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5 5" opacity="0.4"/>
  <path d="M600 200 Q 800 200 950 300" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5 5" opacity="0.4"/>

  <!-- Claude Code Terminal -->
  <rect x="50" y="120" width="200" height="160" rx="10" fill="#161B22" stroke="#30363D" stroke-width="2"/>
  <circle cx="75" cy="140" r="5" fill="#FF5F56"/>
  <circle cx="95" cy="140" r="5" fill="#FFBD2E"/>
  <circle cx="115" cy="140" r="5" fill="#27C93F"/>
  <text x="70" y="180" fill="#8B949E" font-family="monospace" font-size="14">Claude Code</text>
  <text x="70" y="210" fill="#58A6FF" font-family="monospace" font-size="16">$ claude</text>
  <path d="M70 230 H180" stroke="#58A6FF" stroke-width="2" opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="110" to="0" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Router Node -->
  <g filter="url(#glow)">
    <circle cx="600" cy="200" r="40" fill="#1F2937" stroke="#3B82F6" stroke-width="4"/>
    <text x="600" y="208" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-weight="bold" font-size="24">CCR</text>
  </g>

  <!-- Targets -->
  <g transform="translate(950, 70)">
    <rect width="180" height="60" rx="8" fill="#161B22" stroke="#10B981" stroke-width="1"/>
    <text x="90" y="38" text-anchor="middle" fill="#10B981" font-family="Arial" font-size="18">DeepSeek</text>
  </g>
  <g transform="translate(950, 170)">
    <rect width="180" height="60" rx="8" fill="#161B22" stroke="#F59E0B" stroke-width="1"/>
    <text x="90" y="38" text-anchor="middle" fill="#F59E0B" font-family="Arial" font-size="18">OpenRouter</text>
  </g>
  <g transform="translate(950, 270)">
    <rect width="180" height="60" rx="8" fill="#161B22" stroke="#8B5CF6" stroke-width="1"/>
    <text x="90" y="38" text-anchor="middle" fill="#8B5CF6" font-family="Arial" font-size="18">Local / Custom</text>
  </g>

  <!-- Floating Particles -->
  <circle cx="400" cy="150" r="2" fill="#58A6FF">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="250" r="2" fill="#58A6FF">
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="800" cy="120" r="2" fill="#10B981">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>
